<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport"
              content="width=device-width, initial-scale=1.0">
        <title>Admin Account Creation</title>
    </head>
    <body style="text-align: center; margin: 0; padding: 0;">
        <div style="
            width: 100%;
            height: 250px;
            background: green;
            margin: auto;
        ">
            <p style="text-align: left;"><img src="watermelionIncLogo.png" alt="Flowers in Chania" width="51.2" height="51.2">Watermelon Inc</p>

            <div style="
                width: 800px;
                height: 750px;
                background: lightblue;
                margin: auto;
                text-align: center;
            ">
                <h1 style="text-align: center;">Hey, Lets start creating you account!</h1>
                <style>
                    .large-input {
                      width: 300px;
                      height: 25px;
                      font-size: 30px;
                      padding: 5px;
                    }

                    .large-label {
                      font-size: 30px;
                      display: inline-block;
                      width: 300px;
                      text-align: center;
                      margin-right: 5px;
                    }

                    .big-button {
                        width: 200px;
                        height: 50px;
                        font-size: 18px;
                        background-color: green;
                        color: white;
                        border: none;
                        border-radius: 8px;
                        cursor: pointer;
                    }
                </style>

                <form style="text-align: center;">
                    <label for="first name" class="large-label">First Name:</label>
                    <input type="text" id="first name" name="first name" class="large-input"><br><br>

                    <label for="last name" class="large-label">Last Name:</label>
                    <input type="text" id="last name" name="last name" class="large-input"><br><br>

                    <label for="username" class="large-label">Username:</label>
                    <input type="text" id="username" name="username" class="large-input"><br><br>

                    <label for="password" class="large-label">Password:</label>
                    <input type="password" id="password" name="password" class="large-input"><br><br>

                    <label for="email" class="large-label">Email:</label>
                    <input type="email" id="email" name="email" class="large-input"><br><br>

                    <input type="submit" value="Sign Up" class="big-button">
                </form>

            </div>
        </div>
    </body>
</html>
