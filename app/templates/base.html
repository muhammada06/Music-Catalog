<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>{% block title %}Music Catalog{% endblock %}</title>
  <style>
    body {
      margin: 0;
      background: #0d1222;
      color: white;
      font-family: Arial, sans-serif;
    }

    header {
      background: #777;
      padding: 12px;
      border-bottom: 1px solid #444;
    }

    nav a, nav button {
      color: white;
      text-decoration: none;
      margin-right: 12px;
    }

    nav button {
      background: #333;
      border: 1px solid #999;
      padding: 4px 10px;
      border-radius: 4px;
      cursor: pointer;
      color: white;
    }

    main {
      padding: 12px;
      background: transparent;
    }
  </style>
</head>
<body>
  <header>
    <nav>
      <a href="/">Home</a>
      <span style="margin-left:12px;"></span>

      {% if current_user.is_authenticated %}
      <!-- Logout button visible only when logged in -->
      <form action="{{ url_for('auth.logout') }}" method="get" style="display:inline;">
        <button type="submit">Logout</button>
      </form>
      {% else %}
      <!-- show login link when not authenticated -->
      <a href="{{ url_for('auth.login') }}">Login</a>
      {% endif %}
      <!-- (If backend uses POST for logout, change method to post) -->
    </nav>
  </header>

  <main style="padding:12px;">
    {% for category, message in get_flashed_messages(with_categories=true) %}
      {% if not (request.endpoint == 'auth.login' and category == 'logout') %}
        <script>alert("{{ message }}");</script>
      {% endif %}
    {% endfor %}

    {% block content %}{% endblock %}
  </main>
</body>
</html>
