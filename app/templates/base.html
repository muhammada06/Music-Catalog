<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>{% block title %}Music Catalog{% endblock %}</title>
</head>
<body>
  <header style="padding:12px; border-bottom:1px solid #ccc;">
    <nav>
      <a href="/">Home</a>
      <span style="margin-left:12px;"></span>

      <!-- Logout button -->
      <form action="/logout" method="get" style="display:inline;">
        <button type="submit">Logout</button>
      </form>
      <!-- (If backend uses POST for logout, change method to post) -->
    </nav>
  </header>

  <main style="padding:12px;">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
