{% extends "base.html" %}

{% block title %}Edit Song{% endblock %}

{% block content %}
<h1>Edit Song </h1>

<form method="POST" enctype="multipart/form-data">
  <label>Title:</label><br>
  <input type="text" name="title" value="{{ song.title }}" required><br><br>

  <label>Artist:</label><br>
  <input type="text" name="artist" value="{{ song.artist }}" required><br><br>

  <label>Album:</label><br>
  <input type="text" name="album" value="{{ song.album }}"><br><br>

  <label>Genre:</label><br>
  <input type="text" name="genre" value="{{ song.genre }}"><br><br>

  <label>Release Date:</label><br>
  <input type="date" name="release_date" value="{{ song.release_date }}"><br><br>

  <label>Demo Song:</label><br>
  <input type="file" name="audio" value="{{ song.audio_file }}"><br><br>

  <label>Album Cover:</label><br>
  {% if song.album_cover %}
    <img src="{{ url_for('admin.serve_cover', filename=song.album_cover) }}" style="height:80px; border-radius:6px; margin-bottom:6px; display:block;">
  {% endif %}
  <input type="file" name="album_cover" accept="image/*"><br><br>

  <button type="submit">Save Changes</button>
</form>

<form method="POST" action="{{ url_for('admin.removeDemo', song_id=song.id) }}" style="display:inline;">
  <button type="submit" class="button">Remove the demo song!</button>
</form>

{% endblock %}
