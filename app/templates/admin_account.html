{% extends "base.html" %}

{% block title %}Create Admin Account{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
{% endblock %}

{% block content %}

<div class="auth-page">
  <div class="auth-card">
    <h1>Create Admin Account</h1>
    <p class="subtitle">For artists and labels managing their catalog.</p>

    <form action="{{ url_for('admin.creation') }}" method="POST">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" required placeholder="Enter a username">
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required placeholder="Enter a password">
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required placeholder="Enter a email">
      </div>

      <button type="submit" class="submit-btn submit-btn-red">Create Admin Account</button>
    </form>

    <div class="auth-links">
      <span>Already have an account? <a href="{{ url_for('auth.login') }}">Sign in</a></span>
      <span>Not an artist? <a href="{{ url_for('user.get') }}">Create a User account</a></span>
    </div>
  </div>
</div>
{% endblock %}
