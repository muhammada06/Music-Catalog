{% extends "base.html" %}
<!-- create_playlist.html — form for creating a new user playlist.
     POSTs to user.create_playlist; name must be unique per user. -->

{% block title %}Create Playlist{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
{% endblock %}

{% block content %}

<!-- ── Centered Auth Card (reused for playlist creation) ── -->
<div class="auth-page">
  <div class="auth-card">
    <h1>Create Playlist</h1>
    <p class="subtitle">Please enter your playlist name.</p>

    <!-- POSTs to user.create_playlist -->
    <form method="POST">
      <div class="form-group">
        <label for="playlist_name">Playlist Name</label>
        <input type="text" id="playlist_name" name="playlist_name" required placeholder="Enter a Playlist name">
        <!-- is_public checkbox: submitted value "on" means public, absent means private -->
        <label style="display: inline-flex; align-items: center; gap: 6px;">Make this playlist public<input type="checkbox" name="is_public"></label>
      </div>

      <button type="submit" class="submit-btn submit-btn-red">Create New Playlist</button>
    </form>

    <!-- ── Navigation Links ── -->
    <div class="auth-links">
      <span>Want to return? <a href="{{ url_for('user.browse_playlists') }}">Back</a></span>
    </div>
  </div>
</div>
{% endblock %}
