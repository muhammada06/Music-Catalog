{% extends "base.html" %}

{% block title %}Create Admin Account{% endblock %}

{% block content %}
<style>
  .auth-page {
    min-height: calc(100vh - 60px);
    background: #0d1117;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 16px;
  }

  .auth-card {
    background: #161b22;
    border: 1px solid #21262d;
    border-radius: 12px;
    padding: 40px;
    width: 100%;
    max-width: 420px;
  }

  .auth-card h1 {
    font-size: 1.5rem;
    font-weight: 700;
    color: #e6edf3;
    margin-bottom: 4px;
  }

  .auth-card .subtitle {
    font-size: 0.9rem;
    color: #8b949e;
    margin-bottom: 28px;
  }

  .form-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 16px;
  }

  .form-group label {
    font-size: 0.85rem;
    font-weight: 600;
    color: #c9d1d9;
  }

  .form-group input {
    background: #0d1117;
    border: 1px solid #30363d;
    border-radius: 6px;
    padding: 10px 14px;
    font-size: 0.95rem;
    color: #e6edf3;
    outline: none;
    transition: border-color 0.15s;
    width: 100%;
  }

  .form-group input:focus {
    border-color: #58a6ff;
  }

  .submit-btn {
    width: 100%;
    padding: 11px;
    background: #da3633;
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    margin-top: 8px;
    transition: background 0.15s;
  }

  .submit-btn:hover { background: #f85149; }

  .auth-links {
    margin-top: 20px;
    text-align: center;
    font-size: 0.85rem;
    color: #8b949e;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .auth-links a {
    color: #58a6ff;
    text-decoration: none;
  }

  .auth-links a:hover { text-decoration: underline; }
</style>

<div class="auth-page">
  <div class="auth-card">
    <h1>Reset Password</h1>
    <p class="subtitle">Please reset your password below.</p>

    <form method="POST">

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required placeholder="Enter a new password">
      </div>

      <button type="submit" class="submit-btn">Create New Pasword</button>
    </form>

    <div class="auth-links">
      <span>Remember your password? <a href="{{ url_for('auth.login') }}">Sign in</a></span>
    </div>
  </div>
</div>
{% endblock %}
