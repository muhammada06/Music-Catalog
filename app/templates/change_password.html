{% extends "base.html" %}
<!-- change_password.html — shown after a valid password-reset token is verified.
     POSTs the new password to auth.reset_password which hashes and saves it. -->

{% block title %}Change Password{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
{% endblock %}

{% block content %}

<!-- ── Centered Auth Card ── -->
<div class="auth-page">
  <div class="auth-card">
    <h1>Reset Password</h1>
    <p class="subtitle">Please reset your password below.</p>

    <!-- POSTs to the same reset_password route that rendered this page (token is in the URL) -->
    <form method="POST">
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required placeholder="Enter a new password">
      </div>

      <button type="submit" class="submit-btn submit-btn-red">Create New Pasword</button>
    </form>

    <!-- ── Navigation Links ── -->
    <div class="auth-links">
      <span>Remember your password? <a href="{{ url_for('auth.login') }}">Sign in</a></span>
    </div>
  </div>
</div>
{% endblock %}
