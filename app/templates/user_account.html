{% extends "base.html" %}
<!-- user_account.html — registration form for new regular (non-admin) users.
     POSTs to user.creation; a Favorites playlist is auto-created on success. -->

{% block title %}Create User Account{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
{% endblock %}

{% block content %}

<!-- ── Centered Auth Card ── -->
<div class="auth-page">
  <div class="auth-card">
    <h1>Create User Account</h1>
    <p class="subtitle">For listeners who want to browse and stream music.</p>

    <!-- Registration form — username and email must be unique -->
    <form action="{{ url_for('user.creation') }}" method="POST">
      <div class="form-group">
        <label for="first_name">First Name</label>
        <input type="text" id="first_name" name="first_name" required placeholder="Enter your first name">
      </div>

      <div class="form-group">
        <label for="last_name">Last Name</label>
        <input type="text" id="last_name" name="last_name" required placeholder="Enter your last name">
      </div>

      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" required placeholder="Enter a username">
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required placeholder="Enter your email">
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required placeholder="Enter a password">
      </div>

      <button type="submit" class="submit-btn submit-btn-green">Create User Account</button>
    </form>

    <div class="auth-links">
      <span>Already have an account? <a href="{{ url_for('auth.login') }}">Sign in</a></span>
      <span>Artist or label? <a href="{{ url_for('admin.get') }}">Create an Admin account</a></span>
    </div>
  </div>
</div>
{% endblock %}
