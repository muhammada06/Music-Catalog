{% extends "base.html" %}

{% block title %}Add Song{% endblock %}

{% block content %}
<h1>Add a New Song</h1>

<form method="POST" enctype="multipart/form-data">
  <!-- Song title -->
  <div>
    <label for="title">Title:</label>
    <input type="text" name="title" id="title" required>
  </div>

  <!-- Artist -->
  <div>
    <label for="artist">Artist:</label>
    <input type="text" name="artist" id="artist" required>
  </div>

  <!-- Album -->
  <div>
    <label for="album">Album:</label>
    <input type="text" name="album" id="album">
  </div>

  <!-- Genre -->
  <div>
    <label for="genre">Genre:</label>
    <input type="text" name="genre" id="genre">
  </div>

  <!-- Release Date -->
  <div>
    <label for="release_date">Release Date:</label>
    <input type="date" name="release_date" id="release_date">
  </div>

  <!-- Audio file upload -->
  <div>
    <label for="audio">Upload Audio (MP3, WAV, etc.):</label>
    <input type="file" name="audio" id="audio" accept="audio/*">
  </div>

  <!-- Album cover upload -->
  <div>
    <label for="album_cover">Album Cover (JPG, PNG, etc.):</label>
    <input type="file" name="album_cover" id="album_cover" accept="image/*">
  </div>

  <!-- Submit button -->
  <div>
    <button type="submit">Add Song</button>
  </div>
</form>
{% endblock %}
